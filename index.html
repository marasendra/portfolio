<!DOCTYPE html>
<!-- Lien vers les icônes Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<html>
  <head>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div id="particles-js"></div>

    <div class="profile-card">
      <img
        src="https://picsum.photos/100/100"
        alt="Profile"
        class="avatar"
      />
      <h2 class="name">Marie-Ange Rasendra</h2>
      <p class="bio">
        Web developer & data viz enthusiast.
        Building cool stuff with code.
      </p>
      <button class="follow-btn">Follow</button>
      <a href="https://www.linkedin.com/in/marie-ange-rasendra-0231ba10a/" target="_blank" class="linkedin-btn">
    <i class="fab fa-linkedin"></i> 
</a>
    </div>

    <script src="particles.js-master/particles.min.js"></script>
    <script>
      particlesJS("particles-js", {
        particles: {
          number: {
            value: 150,
            density: {
              enable: true,
              value_area: 800,
            },
          },
          color: {
            value: "#9ca3af",
          },
          shape: {
            type: "circle",
          },
          opacity: {
            value: 0.5,
            random: false,
          },
          size: {
            value: 3,
            random: true,
          },
          line_linked: {
            enable: true,
            distance: 150,
            color: "#9ca3af",
            opacity: 0.4,
            width: 1,
          },
          move: {
            enable: true,
            speed: 3,
            direction: "none",
            random: false,
            straight: false,
            out_mode: "out",
            bounce: false,
          },
        },
        interactivity: {
          detect_on: "canvas",
          events: {
            onhover: {
              enable: true,
              mode: "repulse",
            },
            onclick: {
              enable: true,
              mode: "push",
            },
            resize: true,
          },
          modes: {
            repulse: {
              distance: 100,
              duration: 0.4,
            },
            push: {
              particles_nb: 6,
            },
          },
        },
        retina_detect: true,
      });
    </script>
  </body>
</html>
